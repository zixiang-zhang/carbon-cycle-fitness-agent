version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/carboncycle.db
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=qwen-plus
      - LLM_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
